apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: aihr
spec:
  clusterIP: None
  selector:
    app: redis

  ports:
    - port: 6379
      targetPort: 6379

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: aihr
spec:
  serviceName: redis
  replicas: 1

  selector:
    matchLabels:
      app: redis

  template:
    metadata:
      labels:
        app: redis

    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 6379

          args:
            - "--appendonly"
            - "yes"

          volumeMounts:
            - name: redis-data
              mountPath: /data

  volumeClaimTemplates:
    - metadata:
        name: redis-data

      spec:
        accessModes:
          - ReadWriteOnce

        storageClassName: longhorn-2replica

        resources:
          requests:
            storage: 10Gi
